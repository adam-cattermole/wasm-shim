name: Automated Release WASM Shim

on:
  workflow_dispatch:
    inputs:
      gitRef:
        description: Commit SHA, tag or branch name (usually main branch)
        required: true
        default: "main"
        type: string
      wasmShimVersion:
        description: WASM Shim version (semver, e.g., 0.12.1)
        required: true
        default: "0.0.0"
        type: string

jobs:
  auto-release:
    name: Release WASM Shim
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code at git ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.gitRef }}
          token: ${{ secrets.KUADRANT_WORKFLOWS_PAT }}

      - name: Validate semver format
        run: |
          if ! echo "${{ github.event.inputs.wasmShimVersion }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Error: wasmShimVersion must be valid semver format (e.g., 0.12.1, 0.13.0-rc1)"
            exit 1
          fi

      - name: Create release branch
        id: create-release-branch
        shell: bash
        run: |
          base_branch=release-v$(echo "${{ github.event.inputs.wasmShimVersion }}" | sed 's/[+-].*//; s/\.[0-9]*$//')
          echo BASE_BRANCH=$base_branch >> $GITHUB_ENV

          if git ls-remote --exit-code --heads origin $base_branch ; then
            echo "Base branch $base_branch already exists"
          else
            echo "Creating branch $base_branch"
            git checkout -b "$base_branch"
            git push --set-upstream origin "$base_branch"
          fi

      - name: Update Cargo.toml version
        run: |
          sed -i 's/^version = ".*"/version = "${{ github.event.inputs.wasmShimVersion }}"/' Cargo.toml

      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "3.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Cargo.lock
        run: |
          # Install Rust toolchain
          rustup update stable
          # Update lock file by running check
          cargo check

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.KUADRANT_DEV_PAT }}
          commit-message: Prepare release ${{ github.event.inputs.wasmShimVersion }}
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
          signoff: true
          base: ${{ env.BASE_BRANCH }}
          branch: release-v${{ github.event.inputs.wasmShimVersion }}
          delete-branch: true
          title: '[Release] WASM Shim v${{ github.event.inputs.wasmShimVersion }}'
          body: |
            Prepare release for WASM Shim version ${{ github.event.inputs.wasmShimVersion }}

            Auto-generated by [create-pull-request][1]

            [1]: https://github.com/peter-evans/create-pull-request
          draft: false
