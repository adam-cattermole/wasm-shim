---
name: Release

on:
  pull_request:
    types:
    - closed
    branches:
      - 'release-v[0-9]+.[0-9]+'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release-wasm-shim:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    name: Release Wasm Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.KUADRANT_DEV_PAT }}

      - name: Install yq
        uses: mikefarah/yq@v4.52.5

      - name: Extract version from Cargo.toml
        id: extract_version
        run: |
          VERSION=$(yq '.package.version' -p toml Cargo.toml)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=v$VERSION" >> $GITHUB_ENV

      - name: Create and push tag
        run: |
          git tag ${{ env.TAG }}
          git push origin ${{ env.TAG }}

      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          target: wasm32-wasip1

      - name: Set up protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "3.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build WASM binary
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release --target wasm32-wasip1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.TAG }}
          tag_name: ${{ env.TAG }}
          generate_release_notes: true
          files: target/wasm32-wasip1/release/wasm_shim.wasm
          token: ${{ secrets.KUADRANT_DEV_PAT }}
