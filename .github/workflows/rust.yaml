---
name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["*"]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
  schedule:
    - cron: "5 4 * * *"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Rust and WASM environment
        uses: ./.github/actions/setup-rust-wasm
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo check --release --target wasm32-wasip1
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Rust and WASM environment
        uses: ./.github/actions/setup-rust-wasm
        with:
          rust-components: rustfmt
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo build --target=wasm32-wasip1 --release
      - run: cargo fmt --all -- --check
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Rust and WASM environment
        uses: ./.github/actions/setup-rust-wasm
        with:
          rust-components: clippy
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo clippy --all-targets --all-features -- -D warnings
  required-checks:
    name: Rust Required Checks
    # This check adds a list of checks to one job to simplify adding settings to the repo.
    # If a new check is added in this file, and it should be retested on entry to the merge queue,
    # it needs to be added to the list below aka needs: [ existing check 1, existing check 2, new check ].
    needs: [check, fmt, clippy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: echo '${{ toJSON(needs) }}' | jq -e 'all(.[]; .result == "success" or .result == "skipped")'
